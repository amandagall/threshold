<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Threshold</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1C1C1A;
      --gold: #C9A96E;
      --gold-dim: rgba(201, 169, 110, 0.28);
      --cream: #F2EDE4;
      --text-muted: rgba(242, 237, 228, 0.42);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }

    .room {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      text-align: center;
    }

    .wordmark {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 0.95rem;
      letter-spacing: 0.1em;
      color: var(--gold);
      margin-bottom: 4rem;
    }

    .headline {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: clamp(1.75rem, 4vw, 2.75rem);
      line-height: 1.2;
      color: var(--cream);
      margin-bottom: 1.5rem;
    }

    .body-copy {
      font-size: 1rem;
      line-height: 1.9;
      color: var(--text-muted);
      max-width: 420px;
      margin-bottom: 1rem;
      text-wrap: balance;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--gold-dim);
      margin: 2rem auto;
    }

    .loading {
      color: var(--text-muted);
      font-size: 0.9rem;
      letter-spacing: 0.08em;
    }

    .timeline {
      margin-top: 3rem;
      width: 100%;
      max-width: 420px;
      text-align: left;
    }

    .letter {
      padding: 1.5rem;
      border: 1px solid var(--gold-dim);
    }

    .letter-active {
      border-color: rgba(201, 169, 110, 0.5);
      background: rgba(201, 169, 110, 0.04);
    }

    .letter-dim {
      opacity: 0.45;
    }

    .letter-connector {
      width: 1px;
      height: 2rem;
      background: var(--gold-dim);
      margin-left: 1.5rem;
    }

    .letter-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 0.75rem;
    }

    .letter-label {
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.85;
    }

    .letter-name {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 1.1rem;
      color: var(--cream);
    }

    .letter-desc {
      font-size: 0.9rem;
      line-height: 1.8;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
      text-wrap: balance;
    }

    .letter-date {
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      color: var(--gold);
      opacity: 0.75;
    }

    .progress {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin: 1rem 0 1.25rem;
    }

    .progress-label {
      font-size: 0.68rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.6;
      margin-right: 0.25rem;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--gold-dim);
      border: 1px solid rgba(201, 169, 110, 0.4);
    }

    .dot-filled {
      background: var(--gold);
      border-color: var(--gold);
    }

    .answer-cta {
      display: inline-block;
      margin-top: 1.25rem;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      text-decoration: none;
      border: 1px solid var(--gold-dim);
      padding: 0.75rem 1.75rem;
      transition: border-color 0.3s ease, background 0.3s ease;
    }

    .answer-cta:hover {
      border-color: var(--gold);
      background: rgba(201, 169, 110, 0.07);
    }

    .sealed-note {
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      color: var(--gold);
      opacity: 0.6;
      margin-top: 1.25rem;
      font-style: italic;
    }
  </style>
</head>
<body>

<div class="room">
  <p class="wordmark">Threshold</p>
  <div id="content">
    <p class="loading">Opening your capsule...</p>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://fvdsizuvdaanstgvhkmt.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ2ZHNpenV2ZGFhbnN0Z3Zoa210Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwODExMjIsImV4cCI6MjA5NTY1NzEyMn0.xQOHZVbndtkkP8VwZeTIQvT7Pu2RFeLCTGYaNzdYQcI';

  async function loadRoom() {
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if (!token) {
      document.getElementById('content').innerHTML = '<p class="body-copy">No token found. Please use the link from your email.</p>';
      return;
    }

    const response = await fetch(`${SUPABASE_URL}/rest/v1/signups?token=eq.${token}&select=*`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`
      }
    });

    const data = await response.json();

    if (!data || data.length === 0) {
      document.getElementById('content').innerHTML = '<p class="body-copy">We couldn\'t find your capsule. Please use the link from your email.</p>';
      return;
    }

    const user = data[0];
    const retDate = new Date(`${user.retirement_date}T12:00:00`);

    const letterOne = new Date(retDate);
    letterOne.setDate(letterOne.getDate() - 14);

    const letterTwo = new Date(retDate);
    letterTwo.setMonth(letterTwo.getMonth() + 3);

    const letterThree = new Date(retDate);
    letterThree.setFullYear(letterThree.getFullYear() + 1);

    function formatDate(d) {
      return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    }

    // Count answered questions by checking which answer fields have content
    const currentQuestion = user.current_question || 0;
const answeredCount = Math.min(4, ['answer_1','answer_2','answer_3','answer_4'].filter(k => user[k] !== null && user[k] !== undefined && user[k] !== '').length);    const allAnswered = answeredCount >= 4;
    const questionWaiting = currentQuestion > answeredCount && !allAnswered;

    function buildDots(answered) {
      let dots = '';
      for (let i = 0; i < 4; i++) {
        dots += `<span class="dot ${i < answered ? 'dot-filled' : ''}"></span>`;
      }
      return dots;
    }

    let letterOneProgress = '';
    if (allAnswered) {
      letterOneProgress = `
        <div class="progress">
          <span class="progress-label">Progress</span>
          ${buildDots(4)}
        </div>
        <p class="sealed-note">Your envelope is sealed.</p>
      `;
    } else if (questionWaiting) {
      letterOneProgress = `
        <div class="progress">
          <span class="progress-label">Progress</span>
          ${buildDots(answeredCount)}
        </div>
        <a class="answer-cta" href="/answer?token=${token}">A question is waiting →</a>
      `;
    } else if (answeredCount > 0) {
      letterOneProgress = `
        <div class="progress">
          <span class="progress-label">Progress</span>
          ${buildDots(answeredCount)}
        </div>
      `;
    }

    document.getElementById('content').innerHTML = `
      <svg width="90" height="112" viewBox="-10 -16 100 172" role="img" xmlns="http://www.w3.org/2000/svg">
        <path d="M34 22 Q34 -6 58 -10 Q82 -6 82 22 Z" fill="#252318" stroke="#C9A96E" stroke-width="2"/>
        <ellipse cx="58" cy="22" rx="24" ry="6" fill="#1e1c18" stroke="#C9A96E" stroke-width="1.5"/>
        <rect x="0" y="28" width="50" height="90" fill="#242220" stroke="#C9A96E" stroke-width="2"/>
        <path d="M0 118 Q0 146 25 150 Q50 146 50 118 Z" fill="#1e1c18" stroke="#C9A96E" stroke-width="2"/>
        <line x1="0" y1="42" x2="50" y2="42" stroke="#C9A96E" stroke-width="1.2"/>
        <line x1="0" y1="106" x2="50" y2="106" stroke="#C9A96E" stroke-width="1.2"/>
        <ellipse cx="25" cy="28" rx="25" ry="6" fill="#141412" stroke="#C9A96E" stroke-width="1.5"/>
        <circle cx="25" cy="73" r="16" fill="none" stroke="#C9A96E" stroke-width="1.5"/>
        <line x1="25" y1="58" x2="25" y2="62" stroke="#C9A96E" stroke-width="1.5"/>
        <line x1="40" y1="73" x2="36" y2="73" stroke="#C9A96E" stroke-width="1.5"/>
        <line x1="25" y1="88" x2="25" y2="84" stroke="#C9A96E" stroke-width="1.5"/>
        <line x1="10" y1="73" x2="14" y2="73" stroke="#C9A96E" stroke-width="1.5"/>
        <line x1="25" y1="73" x2="18" y2="63" stroke="#C9A96E" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="25" y1="73" x2="33" y2="64" stroke="#C9A96E" stroke-width="1.2" stroke-linecap="round"/>
        <circle cx="25" cy="73" r="2" fill="#C9A96E"/>
      </svg>

      <div class="divider"></div>

      <h1 class="headline">Welcome, ${user.name.split(' ')[0]}.</h1>
      <p class="body-copy">Three letters are making their way to you — each one arriving at a moment that matters. When a letter lands, you'll write inside it. Your words will be sealed away and tucked into your capsule.</p>

      <div class="timeline">

        <div class="letter letter-active">
          <div class="letter-header">
            <p class="letter-label">Letter One</p>
            <p class="letter-name">Before</p>
          </div>
          <p class="letter-desc">Written at the edge of everything you've known. A chance to speak honestly about who you've been.</p>
          <p class="letter-date">Arrives ${formatDate(letterOne)}</p>
          ${letterOneProgress}
        </div>

        <div class="letter-connector"></div>

        <div class="letter letter-dim">
          <div class="letter-header">
            <p class="letter-label">Letter Two</p>
            <p class="letter-name">After</p>
          </div>
          <p class="letter-desc">Arriving when the newness has worn off and the real questions begin to surface.</p>
          <p class="letter-date">Arrives ${formatDate(letterTwo)}</p>
        </div>

        <div class="letter-connector"></div>

        <div class="letter letter-dim">
          <div class="letter-header">
            <p class="letter-label">Letter Three</p>
            <p class="letter-name">Beyond</p>
          </div>
          <p class="letter-desc">A year out. You'll know by then who you're becoming. This letter will want to know too.</p>
          <p class="letter-date">Arrives ${formatDate(letterThree)}</p>
        </div>

      </div>
    `;
  }

  loadRoom();
</script>

</body>
</html>
